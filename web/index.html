<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keco world</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="ui">
        <div id="controls">
          <button data-speed="0">暂停</button>
          <button data-speed="2">1×</button>
          <button data-speed="8">4×</button>
        </div>
        <div id="camera-toggle">
          <button data-mode="follow">跟随</button>
          <button data-mode="overview">俯瞰</button>
        </div>
      </div>
      <div id="flow-overlay"></div>
    </div>
    <div id="side-panel">
      <div id="why-slot"></div>
      <div id="hooks-panel"></div>
      <div id="return-hook-panel"></div>
      <div id="biography-slot"></div>
    </div>
    <ul id="events"></ul>
    <div id="biography-modal" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
